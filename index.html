<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الخزينة v5.6 - طباعة حرارية مطورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        
        /* تنسيقات منطقة الطباعة الحرارية */
        #thermalArea {
            display: none;
            width: 72mm; /* عرض صافي للطباعة داخل الـ 80mm */
            background: white;
            padding: 0;
            margin: 0 auto;
            color: black;
            text-align: center;
        }

        .receipt-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
            border: 1px solid #000;
            table-layout: fixed; /* لضمان عدم خروج الجدول عن العرض */
        }
        
        .receipt-table th, .receipt-table td {
            border: 1px solid #000;
            padding: 2px 1px;
            text-align: center;
            font-size: 10px; /* تصغير الخط ليتناسب مع الورق */
            font-weight: bold;
            word-wrap: break-word;
        }

        .receipt-table th {
            background-color: #f0f0f0 !important;
            -webkit-print-color-adjust: exact;
        }
        
        .print-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #000;
            padding-bottom: 6px;
            margin-bottom: 8px;
            width: 100%;
        }
        
        .header-logo-img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 5px;
        }
        
        .header-text-side {
            text-align: center;
            width: 100%;
        }
        
        .header-branch-name {
            font-size: 15px;
            font-weight: 900;
            margin: 0;
            line-height: 1.2;
        }

        /* إعدادات الطباعة */
        @media print {
            @page { 
                size: 80mm auto; 
                margin: 0; 
            }
            body { background: white; margin: 0; padding: 0; }
            body * { visibility: hidden; }
            #thermalArea, #thermalArea * { visibility: visible; }
            #thermalArea {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 72mm;
                padding: 4mm;
                margin: 0;
            }
            .no-print { display: none !important; }
        }

        .checkbox-custom { width: 20px; height: 20px; cursor: pointer; accent-color: #2563eb; }
        .selected-row { background-color: #eff6ff !important; border-right: 4px solid #2563eb; }
    </style>
</head>
<body class="p-4 md:p-6 pb-32">

    <div class="max-w-7xl mx-auto no-print">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800">إدارة الخزينة v5.6</h1>
                <p class="text-slate-500 font-bold text-xs uppercase">نظام مراجعة البيانات والتقارير المجمعة</p>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchData()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg transition-all active:scale-95">
                    🔄 تحديث البيانات
                </button>
            </div>
        </header>

        <!-- كروت الإحصائيات -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-blue-600">
                <span class="text-slate-400 text-[10px] font-black uppercase">إجمالي الكاش</span>
                <h2 id="stCash" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-emerald-500">
                <span class="text-slate-400 text-[10px] font-black uppercase">انستا باي</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stInsta" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="stInstaCount" class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-black">0</span>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-orange-500">
                <span class="text-slate-400 text-[10px] font-black uppercase">فيزا مبيعات</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stVisa" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="stVisaCount" class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-black">0</span>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-purple-500">
                <span class="text-slate-400 text-[10px] font-black uppercase">المحافظ</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stWallet" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="stWalletCount" class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-black">0</span>
                </div>
            </div>
        </div>

        <!-- فلاتر البحث -->
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 flex flex-wrap gap-4 items-end border border-slate-100">
            <div class="flex-1 min-w-[150px]">
                <label class="block text-[10px] font-black text-slate-500 mb-1">الفرع</label>
                <select id="fBranch" class="w-full bg-slate-50 border-2 border-slate-100 p-2.5 rounded-2xl outline-none font-bold focus:border-blue-500 transition-all">
                    <option value="">جميع الفروع</option>
                </select>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-[10px] font-black text-slate-500 mb-1">التاريخ</label>
                <input type="date" id="fDate" class="w-full bg-slate-50 border-2 border-slate-100 p-2.5 rounded-2xl outline-none font-bold">
            </div>
            <div class="w-32">
                <label class="block text-[10px] font-black text-slate-500 mb-1">رقم الدرج</label>
                <input type="number" id="fDrawer" placeholder="الدرج" class="w-full bg-slate-50 border-2 border-slate-100 p-2.5 rounded-2xl outline-none font-bold">
            </div>
            <button onclick="fetchData()" class="bg-slate-900 text-white px-10 py-3.5 rounded-2xl font-black hover:bg-black transition-all shadow-xl">بحث</button>
        </div>

        <!-- الجدول الرئيسي -->
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-100 mb-6">
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] font-black border-b border-slate-100">
                        <tr>
                            <th class="p-5 text-center"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" class="checkbox-custom"></th>
                            <th class="p-5">الدرج</th>
                            <th class="p-5">الفرع</th>
                            <th class="p-5">التاريخ</th>
                            <th class="p-5">كاش</th>
                            <th class="p-5">الإجمالي</th>
                            <th class="p-5">الفرق</th>
                            <th class="p-5 text-center">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="mainTableBody" class="divide-y divide-slate-50 font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <!-- تفاصيل السجل المختارة -->
        <div id="detailsPanel" class="hidden bg-white p-8 rounded-3xl shadow-xl border-2 border-blue-100 mb-10 transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-blue-900">المعاينة التفصيلية</h3>
                <button onclick="closeDetails()" class="text-slate-400 hover:text-red-500 font-bold">إغلاق ✖</button>
            </div>
            <div id="detailsContent" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- الإجراءات المجمعة -->
    <div id="bulkActions" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white p-4 rounded-3xl shadow-2xl flex items-center gap-6">
        <span id="selectedCount" class="text-sm font-black text-blue-400 px-4">0 مختارة</span>
        <button onclick="generateDailyReport()" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-black hover:bg-blue-500 transition-colors">🖨️ طباعة تقرير مجمع</button>
    </div>

    <!-- منطقة الطباعة (مخفية) -->
    <div id="thermalArea"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const logoUrl = "https://lh3.googleusercontent.com/pw/AP1GczOHV-3gVfsqN_Y3nGe3v3khgZh8jnMiyzrIg6KECReqrTpnHFK4Adt-_QMyqjcqzy4a2XuXO-sHdgygcqRXcBg0jRmhi4K82oIia841B8vVLescBEqAtn2sZrGf5UO8AqKouvByzQKvoXET4XtjA7-t=w2499-h2499-s-no-gm?authuser=0";
    const logoPreload = new Image(); logoPreload.src = logoUrl;

    let fetchedRecords = [];

    window.onload = () => { loadBranches(); fetchData(); };

    function loadBranches() {
        db.ref("branches").once("value", s => {
            const sel = document.getElementById("fBranch");
            s.forEach(c => sel.innerHTML += `<option value="${c.key}">${c.val().name}</option>`);
        });
    }

    function sum(arr) {
        if(!arr || !Array.isArray(arr)) return 0;
        return arr.reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);
    }

    function fetchData() {
        const body = document.getElementById("mainTableBody");
        const bF = document.getElementById("fBranch").value;
        const dF = document.getElementById("fDate").value;
        const drF = document.getElementById("fDrawer").value;
        body.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-300 font-bold">جاري المزامنة...</td></tr>`;

        db.ref("treasury").once("value", s => {
            body.innerHTML = ""; fetchedRecords = [];
            s.forEach(c => {
                const item = c.val(); item.key = c.key;
                if (bF && item.branchKey !== bF) return;
                if (dF && item.date !== dF) return;
                if (drF && item.drawer != drF) return;
function sum(arr) {
        if(!arr || !Array.isArray(arr)) return 0;
        return arr.reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);
    }

    function fetchData() {
        const body = document.getElementById("mainTableBody");
        const bF = document.getElementById("fBranch").value;
        const dF = document.getElementById("fDate").value;
        const drF = document.getElementById("fDrawer").value;
        body.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-300 font-bold">جاري المزامنة...</td></tr>`;

        db.ref("treasury").once("value", s => {
            body.innerHTML = ""; fetchedRecords = [];
            s.forEach(c => {
                const item = c.val(); item.key = c.key;
                if (bF && item.branchKey !== bF) return;
                if (dF && item.date !== dF) return;
                if (drF && item.drawer != drF) return;
                fetchedRecords.push(item);
            });
            fetchedRecords.sort((x, y) => y.timestamp - x.timestamp);

            let tC=0, tI=0, cI=0, tW=0, cW=0, tV=0, cV=0;
            fetchedRecords.forEach(item => {
                const iS=sum(item.insta), iC=(item.insta||[]).length;
                const wS=sum(item.wallet), wC=(item.wallet||[]).length;
                const vS=sum(item.visa), vC=item.visa ? item.visa.reduce((a,b)=>a+(+b.count||0),0) : 0;
                tC+=(+item.cash||0); tI+=iS; cI+=iC; tW+=wS; cW+=wC; tV+=vS; cV+=vC;

                const tr = document.createElement("tr");
                tr.className = "hover:bg-blue-50 transition-all cursor-pointer";
                tr.onclick = (e) => { if(!e.target.classList.contains('row-check') && e.target.tagName !== 'BUTTON') showDetails(item, tr); };
                tr.innerHTML = `
                    <td class="p-5 text-center"><input type="checkbox" value="${item.key}" onchange="updateSelectedCount()" class="row-check checkbox-custom"></td>
                    <td class="p-5">#${item.drawer}</td>
                    <td class="p-5 text-slate-400">${item.branchName}</td>
                    <td class="p-5 text-[11px]">${item.date}</td>
                    <td class="p-5 text-blue-600">${item.cash}</td>
                    <td class="p-5">${item.total}</td>
                    <td class="p-5 ${+item.diff < 0 ? 'text-red-500' : 'text-green-500'}">${item.diff}</td>
                    <td class="p-5 text-center"><button onclick='printSingle(${JSON.stringify(item)})' class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-xl text-xs font-black">طبع</button></td>
                `;
                body.appendChild(tr);
            });
            document.getElementById("stCash").innerText = tC.toLocaleString();
            document.getElementById("stInsta").innerText = tI.toLocaleString();
            document.getElementById("stInstaCount").innerText = cI;
            document.getElementById("stWallet").innerText = tW.toLocaleString();
            document.getElementById("stWalletCount").innerText = cW;
            document.getElementById("stVisa").innerText = tV.toLocaleString();
            document.getElementById("stVisaCount").innerText = cV;
        });
    }

    function showDetails(item, row) {
        const panel = document.getElementById("detailsPanel");
        const content = document.getElementById("detailsContent");
        document.querySelectorAll("#mainTableBody tr").forEach(tr => tr.classList.remove('selected-row'));
        row.classList.add('selected-row');
        panel.classList.remove("hidden");
        content.innerHTML = `
            ${renderSubTableHTML("الفيزا", item.visa, 'visa')}
            ${renderSubTableHTML("انستا باي", item.insta, 'trans')}
            ${renderSubTableHTML("المحافظ", item.wallet, 'trans')}
            ${renderSubTableHTML("المشتريات", item.purchases, 'exp')}
            ${renderSubTableHTML("المصروفات", item.expenses, 'exp')}
        `;
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeDetails() {
        document.getElementById("detailsPanel").classList.add("hidden");
        document.querySelectorAll("#mainTableBody tr").forEach(tr => tr.classList.remove('selected-row'));
    }

    function renderSubTableHTML(title, arr, type) {
        if(!arr || arr.length === 0) return `<div class="bg-slate-50 p-4 rounded-2xl text-center text-slate-400 font-bold">${title}: لا يوجد</div>`;
        let h = `<div class="bg-white border rounded-2xl overflow-hidden shadow-sm">
            <div class="bg-slate-800 text-white p-2 text-[10px] font-black text-center">${title}</div>
            <table class="w-full text-[11px] text-right"><thead><tr class="bg-slate-50 border-b">`;
        
        if(type==='visa') h += `<th>باتش</th><th>مبلغ</th><th>ع</th>`;
        else if(type==='trans') h += `<th>مبلغ</th><th>الرقم</th><th>صاحب الرقم</th>`;
        else h += `<th>مبلغ</th><th>البيان</th><th>المستلم</th>`;
        
        h += `</tr></thead><tbody>`;
        arr.forEach(x => {
            h += `<tr class="border-b">`;
            if(type==='visa') h += `<td>${x.batch}</td><td>${x.amount}</td><td>${x.count}</td>`;
            else if(type==='trans') h += `<td>${x.amount}</td><td>${x.mobile||''}</td><td>${x.name||''}</td>`;
            else h += `<td>${x.amount}</td><td>${x.note||''}</td><td>${x.user||''}</td>`;
            h += `</tr>`;
        });
        
        let totalVal = sum(arr);
        h += `<tr class="bg-blue-50 font-black"><td>الإجمالي</td><td colspan="2" class="text-left">${totalVal}</td></tr>`;
        
        h += `</tbody></table></div>`;
        return h;
    }

    function toggleSelectAll(master) {
        document.querySelectorAll(".row-check").forEach(c => c.checked = master.checked);
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const count = document.querySelectorAll(".row-check:checked").length;
        const bulk = document.getElementById("bulkActions");
        if(count > 0) { bulk.classList.remove("hidden"); document.getElementById("selectedCount").innerText = `${count} ورديات مختارة`; }
        else { bulk.classList.add("hidden"); }
    }

    function generateDailyReport() {
        const selectedKeys = Array.from(document.querySelectorAll(".row-check:checked")).map(c => c.value);
        const selectedData = fetchedRecords.filter(r => selectedKeys.includes(r.key));
        if(selectedData.length === 0) return;

        let agg = {
            cash: 0, actual: 0, total: 0, diff: 0,
            insta: [], wallet: [], visa: [], purchases: [], expenses: [],
            branchNames: new Set(), date: selectedData[0].date, day: selectedData[0].day
        };
        selectedData.forEach(d => {
            agg.cash += (+d.cash||0); agg.actual += (+d.actual||0);
            agg.total += (+d.total||0); agg.diff += (+d.diff||0);
            if(d.insta) agg.insta.push(...d.insta);
            if(d.wallet) agg.wallet.push(...d.wallet);
            if(d.visa) agg.visa.push(...d.visa);
            if(d.purchases) agg.purchases.push(...d.purchases);
            if(d.expenses) agg.expenses.push(...d.expenses);
            agg.branchNames.add(d.branchName);
        });
        printThermal(agg, true);
    }

    function printSingle(d) { printThermal(d, false); }

    function printThermal(d, isAgg) {
        const area = document.getElementById("thermalArea");
        const branchTitle = isAgg ? Array.from(d.branchNames).join(" + ") : d.branchName;
        
        area.innerHTML = `
            <div class="print-header">
                <img src="${logoUrl}" class="header-logo-img">
                <div class="header-text-side">
                    <h2 class="header-branch-name">${branchTitle}</h2>
                    <div style="font-size:10px; font-weight:bold; margin-top:2px;">تقرير ${isAgg ? 'يومي مجمع' : 'تسليم وردية'}</div>
                </div>
            </div>

            <table class="receipt-table" style="margin-bottom:8px; border:none; text-align:center;">
                <tr style="border:none;">
                    <td style="border:1px solid #000; font-size:9px;">${d.day || '---'}</td>
                    <td style="border:1px solid #000; font-size:9px;">${d.date}</td>
                    <td style="border:1px solid #000; font-size:9px;">درج: ${isAgg ? 'مجمع' : `#${d.drawer}`}</td>
                </tr>
            </table>

            <table class="receipt-table" style="font-size:11px;">
                <thead>
                    <tr style="background:#eee">
                        <th style="width:50%">البيان</th>
                        <th style="width:50%">القيمة</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>إجمالي الكاش</td><td>${d.cash}</td></tr>
                    <tr><td>انستا باي</td><td>${sum(d.insta)}</td></tr>
                    <tr><td>محافظ</td><td>${sum(d.wallet)}</td></tr>
                    <tr><td>فيزا مبيعات</td><td>${sum(d.visa)}</td></tr>
                    <tr style="background:#f0f0f0; font-size:13px; font-weight:900;"><td>المبلغ الفعلي</td><td>${d.actual}</td></tr>
                    <tr><td>إجمالي الحساب</td><td>${d.total}</td></tr>
                    <tr style="color:${+d.diff < 0 ? 'red' : 'green'}; font-weight:900;"><td>الفرق</td><td>${d.diff}</td></tr>
                </tbody>
            </table>

            ${renderSubTablePrint("تفاصيل انستا باي", d.insta, 'trans')}
            ${renderSubTablePrint("تفاصيل المحافظ", d.wallet, 'trans')}
            ${renderSubTablePrint("تفاصيل المشتريات", d.purchases, 'exp')}
            ${renderSubTablePrint("تفاصيل المصروفات", d.expenses, 'exp')}
            ${renderSubTablePrint("تفاصيل الفيزا", d.visa, 'visa')}

            <div style="display:flex; justify-content:space-between; margin-top:15px; border-top:1px solid #000; padding-top:8px; font-size:9px; font-weight:bold;">
                <div>المسؤول: ${d.drawerManager || '_______'}</div>
                <div>المراجع: ${d.reviewer || '_______'}</div>
            </div>
            
            <div style="text-align:center; font-size:8px; margin-top:10px; border-top:1px dashed #ccc; padding-top:4px; color:#555;">
                نظام البيانات الدقيقة - ${new Date().toLocaleString('ar-EG')}
            </div>
        `;
        
        // مهلة بسيطة للتأكد من تحميل الصور قبل الطباعة
        setTimeout(() => { window.print(); }, 400);
    }

    function renderSubTablePrint(title, arr, type) {
        if(!arr || arr.length === 0) return "";
        let h = `<div style="text-align:center; font-weight:900; margin-top:10px; border-top:1px dashed #000; padding-top:4px; font-size:10px;">- ${title} -</div>`;
        h += `<table class="receipt-table"><thead><tr>`;
        
        if(type==='visa') h += `<th style="width:35%">باتش</th><th style="width:35%">قيمة</th><th style="width:30%">ع</th>`;
        else if(type==='trans') h += `<th style="width:30%">مبلغ</th><th style="width:35%">الرقم</th><th style="width:35%">الاسم</th>`;
        else h += `<th style="width:30%">مبلغ</th><th style="width:40%">البيان</th><th style="width:30%">المستلم</th>`;
        
        h += `</tr></thead><tbody>`;
        arr.forEach(x => {
            h += `<tr>`;
            if(type==='visa') h += `<td>${x.batch}</td><td>${x.amount}</td><td>${x.count}</td>`;
            else if(type==='trans') h += `<td>${x.amount}</td><td>${x.mobile||''}</td><td style="font-size:8px;">${x.name||''}</td>`;
            else h += `<td>${x.amount}</td><td style="font-size:8px;">${x.note||''}</td><td style="font-size:8px;">${x.user||''}</td>`;
            h += `</tr>`;
        });
        
        let totalVal = sum(arr);
        h += `<tr style="background:#f9f9f9; font-weight:900;"><td>إجمالي</td><td colspan="2">${totalVal}</td></tr>`;
        
        h += `</tbody></table>`;
        return h;
    }
</script>
